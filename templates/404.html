{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable — ArtHome</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream:#f7f4ef; --ink:#1a1714; --ink-muted:#6b6560; --accent:#c8a96e; --border:#e2ddd6; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--cream); }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 3rem; position: relative; overflow: hidden; }
    .page::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 80%, rgba(200,169,110,0.15) 0%, transparent 60%); pointer-events: none; }
    .num { font-family: 'Cormorant Garamond', serif; font-size: clamp(6rem, 20vw, 12rem); font-weight: 300; color: var(--accent); opacity: 0.3; line-height: 1; margin-bottom: -1rem; position: relative; z-index: 1; }
    .title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 300; color: var(--cream); margin-bottom: 1rem; position: relative; z-index: 1; }
    .sub { font-size: 0.9rem; color: rgba(247,244,239,0.5); font-weight: 300; max-width: 36ch; line-height: 1.6; margin-bottom: 2.5rem; position: relative; z-index: 1; }
    .btn { display: inline-block; padding: 0.85rem 2rem; background: var(--accent); color: var(--ink); border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; position: relative; z-index: 1; }
    .btn:hover { background: #d4b87a; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); text-decoration: none; margin-bottom: 3rem; position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="logo">Art/Home</a>
    <p class="num">404</p>
    <h1 class="title">Page introuvable.</h1>
    <p class="sub">Cette page n'existe pas ou a été déplacée. Revenez à l'accueil pour continuer.</p>
    <a href="/" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
